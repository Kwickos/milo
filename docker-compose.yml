# Infra locale de Milo : Postgres (avec pgvector) + Redis.
# Lancer : docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: milo
      POSTGRES_PASSWORD: milo
      POSTGRES_DB: milo
    ports:
      # Hôte 5433 → conteneur 5432, pour éviter tout conflit avec un Postgres natif sur 5432.
      - '5433:5432'
    volumes:
      - milo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U milo -d milo']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - milo_redis:/data

volumes:
  milo_pg:
  milo_redis:
